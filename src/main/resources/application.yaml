logging:
  config: classpath:log4j2.xml

server:
  servlet:
    context-path: /SpringBootTemplate

spring:
  application:
    name: springbootemplate

  servlet:
    encoding:
      charset: UTF-8
      force: true

  jpa:
    open-in-view: false

  flyway:
    enabled: true
    schema: springbootemplate
    baseline-on-migrate: true
    default-schema: springbootemplate

  web:
    error:
      include-stacktrace: never

---

spring:
  config:
    activate:
      on-profile: dev

server:
  port: 9017

---

spring:
  config:
    activate:
      on-profile: prod

server:
  port: 9027

---

spring:
  config:
    activate:
      on-profile: test